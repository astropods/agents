# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: pirate-echo

meta:
  visibility: public

agent:
  build:
    context: .
    dockerfile: Dockerfile
  distributed: false
  interfaces:
    frontend: false
    messaging: true

models:
  main:
    provider: anthropic
    models:
      - claude-sonnet-4-5

dev:
  interfaces:
    messaging:
      adapters: [web]