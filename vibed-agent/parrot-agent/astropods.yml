# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: parrot-agent

meta:
  visibility: public

agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    frontend: false
    messaging: true

models:
  main:
    provider: anthropic
    models:
      - claude-sonnet-4-5
    inputs:
      - name: ANTHROPIC_API_KEY
        datatype: string
        secret: true
        description: Anthropic API key for Claude models

dev:
  interfaces:
    messaging:
      adapters: [web]
