spec: astro/v1
name: github-issue-analyzer

meta:
  description: GitHub Issue Analyzer — ingests GitHub issues into a Neo4j knowledge graph with OpenAI-powered analysis

agent:
  build:
    context: .
    dockerfile: Dockerfile

models:
  openai:
    provider: openai

tools:
  github:
    provider: github

knowledge:
  graph:
    provider: neo4j

ingestion:
  startup:
    container:
      build:
        context: .
        dockerfile: ingestion/Dockerfile
        args:
          SYNC_MODE: "startup"
          ISSUE_LIMIT: "20"
          GITHUB_OWNER: "facebook"
          GITHUB_REPO: "react"
    trigger:
      type: startup
  schedule:
    container:
      build:
        context: .
        dockerfile: ingestion/Dockerfile
        args:
          SYNC_MODE: "schedule"
          ISSUE_LIMIT: "0"
          GITHUB_OWNER: "facebook"
          GITHUB_REPO: "react"
    trigger:
      type: schedule

dev:
  interfaces: [web]
