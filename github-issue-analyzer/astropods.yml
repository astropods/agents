spec: astro/v1
name: github-issue-analyzer

meta:
  visibility: public

agent:
  build:
    context: .
    dockerfile: Dockerfile

models:
  openai:
    provider: openai

integrations:
  github:
    provider: github

knowledge:
  graph:
    provider: neo4j

ingestion:
  startup:
    container:
      build:
        context: .
        dockerfile: ingestion/Dockerfile
        args:
          SYNC_MODE: "startup"
          ISSUE_LIMIT: "20"
          GITHUB_OWNER: "mastra-ai"
          GITHUB_REPO: "mastra"
    trigger:
      type: startup

dev:
  interfaces: [web, slack]
