spec: astro/v1
name: "github-issue-analyzer"

meta: {}

agent:
  build:
    context: .
    dockerfile: Dockerfile

models:
  openai:
    provider: openai

integrations:
  github:
    provider: github

knowledge:
  graph:
    provider: neo4j

ingestion:
  startup:
    container:
      build:
        context: .
        dockerfile: ingestion/Dockerfile
        args:
          SYNC_MODE: "startup"
          ISSUE_LIMIT: "20"
          GITHUB_OWNER: "mastra-ai"
          GITHUB_REPO: "mastra"
    trigger:
      type: startup
  schedule:
    container:
      build:
        context: .
        dockerfile: ingestion/Dockerfile
        args:
          SYNC_MODE: "schedule"
          ISSUE_LIMIT: "0"
          GITHUB_OWNER: "mastra-ai"
          GITHUB_REPO: "mastra"
    trigger:
      type: schedule

dev:
  interfaces: [web]
