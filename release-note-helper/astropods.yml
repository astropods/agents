spec: package/v1
name: release-note-helper

providers:
  jira:
    scope: [integrations]
    variables:
      - name: API_KEY
        description: Jira API token
        datatype: string
        secret: true
      - name: BASE_URL
        description: Jira instance base URL (e.g. https://your-org.atlassian.net)
        datatype: string
        secret: true
      - name: EMAIL
        description: Atlassian account email for Jira API authentication
        datatype: string
        secret: true

agent:
  build:
    context: .
    dockerfile: Dockerfile

models:
  anthropic:
    provider: anthropic

integrations:
  github:
    provider: github
  jira:
    provider: jira

knowledge:
  preferences:
    provider: redis

dev:
  interfaces: [web, slack]
